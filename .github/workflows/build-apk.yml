name: Build Android APK

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      # Checkout repo
      - name: Checkout code
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      # Setup Java (required for Android build)
      - name: Set up Java
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: 17

      # Setup Flutter
      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: 3.24.0
          channel: stable
          cache: true

      # Create google-services.json for Firebase
      - name: Create google-services.json
        run: |
          mkdir -p android/app/src
          cat > android/app/src/google-services.json << 'EOF'
          {
            "project_info": {
              "project_number": "666046041125",
              "project_id": "quiz-forge-666046041125",
              "storage_bucket": "quiz-forge-666046041125.appspot.com"
            },
            "client": [
              {
                "client_info": {
                  "mobilesdk_app_id": "1:666046041125:android:2lc674r7jivd8pdriing84c06e8ajdbt",
                  "android_client_info": {
                    "package_name": "com.quizforge.app"
                  }
                },
                "oauth_client": [
                  {
                    "client_id": "666046041125-2lc674r7jivd8pdriing84c06e8ajdbt.apps.googleusercontent.com",
                    "client_type": 3
                  }
                ],
                "api_key": [
                  {
                    "current_key": "AIzaSyCTBlCBXH3uCtmo1K9juaZe1kxvv6avtec"
                  }
                ],
                "services": {
                  "appinvite_service": {
                    "other_platform_oauth_client": [
                      {
                        "client_id": "666046041125-2lc674r7jivd8pdriing84c06e8ajdbt.apps.googleusercontent.com",
                        "client_type": 3
                      }
                    ]
                  }
                }
              }
            ],
            "configuration_version": "1"
          }
          EOF

      # Create .env file with the actual API key for the presentation build
      - name: Create .env with API key
        run: echo "GEMINI_API_KEY=AIzaSyAH2bUX7bjGZYdWJkDY6IWG0RGLoMXteBk" > .env

      # Install dependencies
      - name: Get dependencies
        run: flutter pub get

      # Analyze code (info level only - don't fail on warnings)
      - name: Analyze project
        run: flutter analyze --no-fatal-infos || true

      # Build APK (split per ABI for lower memory usage)
      - name: Build APK (split per ABI)
        run: flutter build apk --release --split-per-abi
        env:
          GRADLE_OPTS: -Dorg.gradle.jvmargs="-Xmx2048m -XX:MaxMetaspaceSize=1024m -XX:+HeapDumpOnOutOfMemoryError"

      # Upload arm64-v8a APK
      - name: Upload APK (arm64-v8a)
        uses: actions/upload-artifact@v4
        with:
          name: quiz-forge-apk-arm64-v8a
          path: build/app/outputs/flutter-apk/app-arm64-v8a-release.apk

      # Upload armeabi-v7a APK
      - name: Upload APK (armeabi-v7a)
        uses: actions/upload-artifact@v4
        with:
          name: quiz-forge-apk-armeabi-v7a
          path: build/app/outputs/flutter-apk/app-armeabi-v7a-release.apk

      # Upload x86_64 APK
      - name: Upload APK (x86_64)
        uses: actions/upload-artifact@v4
        with:
          name: quiz-forge-apk-x86-64
          path: build/app/outputs/flutter-apk/app-x86_64-release.apk
